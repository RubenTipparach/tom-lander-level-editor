name: Deploy to GitHub Pages

on:
  push:
    branches: ['**']
  workflow_dispatch:

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Stage site
        id: stage
        run: |
          mkdir -p _site
          # Copy static site files (exclude repo/workflow artifacts)
          rsync -a --exclude='.git' --exclude='.github' --exclude='_site' --exclude='web-run.bat' ./ _site/

          BRANCH="${GITHUB_REF_NAME}"
          SAFE_BRANCH="${BRANCH//\//-}"
          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"
          echo "safe_branch=${SAFE_BRANCH}" >> "$GITHUB_OUTPUT"
          if [ "${BRANCH}" = "main" ]; then
            echo "dest=." >> "$GITHUB_OUTPUT"
          else
            echo "dest=branches/${SAFE_BRANCH}" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
          destination_dir: ${{ steps.stage.outputs.dest }}
          keep_files: true
          commit_message: "deploy ${{ steps.stage.outputs.branch }} @ ${{ github.sha }}"

      - name: Summary
        run: |
          OWNER_REPO="${GITHUB_REPOSITORY}"
          OWNER="${OWNER_REPO%%/*}"
          REPO="${OWNER_REPO##*/}"
          if [ "${{ steps.stage.outputs.branch }}" = "main" ]; then
            URL="https://${OWNER}.github.io/${REPO}/"
          else
            URL="https://${OWNER}.github.io/${REPO}/branches/${{ steps.stage.outputs.safe_branch }}/"
          fi
          echo "Deployed ${{ steps.stage.outputs.branch }} to ${URL}" >> "$GITHUB_STEP_SUMMARY"
